    // ============================================================
    // PLAYABLE KEYBOARD (Web Audio API)
    // ============================================================

    // ── Salamander Grand Piano sample playback ──
    const audioCtxRef = { current: null };
    function getAudioCtx() {
      if (!audioCtxRef.current) audioCtxRef.current = new (window.AudioContext || window.webkitAudioContext)();
      return audioCtxRef.current;
    }

    // Salamander Grand Piano samples (Tone.js CDN) — sampled every 3 semitones
    const SALAMANDER_CDN = 'https://tonejs.github.io/audio/salamander/';
    const SAMPLE_NOTE_NAMES = ['C', 'Ds', 'Fs', 'A']; // every minor 3rd
    const sampleBuffers = {}; // cache: "A4" -> AudioBuffer
    let samplesLoading = false;
    let samplesReady = false;

    // Map MIDI note to nearest sample name and cents detune
    function midiToSampleInfo(midi) {
      const noteNames = ['C', 'Cs', 'D', 'Ds', 'E', 'F', 'Fs', 'G', 'Gs', 'A', 'As', 'B'];
      const sampleMidiNotes = []; // [{midi, name}]
      // Build list of all sampled notes (every 3 semitones: C, Ds, Fs, A in each octave)
      for (let oct = 0; oct <= 8; oct++) {
        for (const sn of SAMPLE_NOTE_NAMES) {
          const idx = ['C','Cs','D','Ds','E','F','Fs','G','Gs','A','As','B'].indexOf(sn);
          const m = (oct + 1) * 12 + idx; // MIDI: C0=12, C1=24, etc. (Tone.js uses C1=C1)
          if (m >= 21 && m <= 108) sampleMidiNotes.push({ midi: m, name: sn + oct });
        }
      }
      // Find closest sample
      let best = sampleMidiNotes[0];
      let bestDist = Math.abs(midi - best.midi);
      for (const s of sampleMidiNotes) {
        const d = Math.abs(midi - s.midi);
        if (d < bestDist) { best = s; bestDist = d; }
      }
      return { name: best.name, detune: (midi - best.midi) * 100 }; // detune in cents
    }

    // Preload samples for a range of MIDI notes
    async function preloadSamples(midiLow, midiHigh) {
      const ctx = getAudioCtx();
      const needed = new Set();
      for (let m = midiLow; m <= midiHigh; m++) {
        needed.add(midiToSampleInfo(m).name);
      }
      const promises = [];
      for (const name of needed) {
        if (sampleBuffers[name]) continue;
        const url = SALAMANDER_CDN + name.replace('s', 's') + '.mp3';
        // Salamander uses: A0.mp3, C1.mp3, Ds1.mp3, Fs1.mp3 etc.
        promises.push(
          fetch(url).then(r => r.arrayBuffer()).then(buf => ctx.decodeAudioData(buf)).then(decoded => {
            sampleBuffers[name] = decoded;
          }).catch(() => { /* sample not available, will use synth fallback */ })
        );
      }
      if (promises.length > 0) await Promise.all(promises);
      samplesReady = Object.keys(sampleBuffers).length > 0;
    }

    // Start preloading common range on first interaction
    let preloadStarted = false;
    function ensurePreload() {
      if (preloadStarted) return;
      preloadStarted = true;
      // Preload octaves 2-6 (MIDI 48-84) which covers the playable keyboard range
      preloadSamples(36, 96).then(() => { samplesReady = true; });
    }

    function playNote(midiNote, duration = 0.6) {
      const ctx = getAudioCtx();
      ensurePreload();
      const now = ctx.currentTime;

      const info = midiToSampleInfo(midiNote);
      const buffer = sampleBuffers[info.name];

      if (buffer) {
        // Play real piano sample
        const source = ctx.createBufferSource();
        source.buffer = buffer;
        source.detune.value = info.detune;
        const gain = ctx.createGain();
        gain.gain.setValueAtTime(0.8, now);
        // Natural decay — let the sample ring then fade
        const fadeStart = Math.max(duration * 0.7, 0.3);
        gain.gain.setValueAtTime(0.8, now + fadeStart);
        gain.gain.exponentialRampToValueAtTime(0.001, now + duration + 1.5);
        source.connect(gain);
        gain.connect(ctx.destination);
        source.start(now);
        source.stop(now + duration + 2);
      } else {
        // Fallback: triangle wave synth while samples load
        const freq = 440 * Math.pow(2, (midiNote - 69) / 12);
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = "triangle";
        osc.frequency.setValueAtTime(freq, now);
        gain.gain.setValueAtTime(0.35, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + duration);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start(now);
        osc.stop(now + duration);
      }
    }

    // Sustained note playback for MIDI keyboards (note-on / note-off)
    const activeNotes = {}; // midiNote -> { source, gain }

    function playNoteStart(midiNote, velocity = 100) {
      const ctx = getAudioCtx();
      ensurePreload();
      const now = ctx.currentTime;
      const vol = (velocity / 127) * 0.8;

      // Stop any existing note on this key
      if (activeNotes[midiNote]) playNoteStop(midiNote);

      const info = midiToSampleInfo(midiNote);
      const buffer = sampleBuffers[info.name];

      if (buffer) {
        const source = ctx.createBufferSource();
        source.buffer = buffer;
        source.detune.value = info.detune;
        const gain = ctx.createGain();
        gain.gain.setValueAtTime(vol, now);
        source.connect(gain);
        gain.connect(ctx.destination);
        source.start(now);
        activeNotes[midiNote] = { source, gain };
      } else {
        // Fallback synth
        const freq = 440 * Math.pow(2, (midiNote - 69) / 12);
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = "triangle";
        osc.frequency.setValueAtTime(freq, now);
        gain.gain.setValueAtTime(vol * 0.4, now);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start(now);
        activeNotes[midiNote] = { source: osc, gain };
      }
    }

    function playNoteStop(midiNote) {
      const note = activeNotes[midiNote];
      if (!note) return;
      const ctx = getAudioCtx();
      const now = ctx.currentTime;
      try {
        note.gain.gain.setValueAtTime(note.gain.gain.value, now);
        note.gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
        setTimeout(() => { try { note.source.stop(); } catch(e) {} }, 400);
      } catch(e) {}
      delete activeNotes[midiNote];
    }

    // Bass synth — warm upright bass sound (sine + sub-octave + gentle attack)
    function playBassNote(midiNote, duration = 1.5) {
      const ctx = getAudioCtx();
      const now = ctx.currentTime;
      const freq = 440 * Math.pow(2, (midiNote - 69) / 12);

      // Main tone (sine for warmth)
      const osc1 = ctx.createOscillator();
      osc1.type = 'sine';
      osc1.frequency.setValueAtTime(freq, now);

      // Sub-octave for depth
      const osc2 = ctx.createOscillator();
      osc2.type = 'sine';
      osc2.frequency.setValueAtTime(freq / 2, now);

      // Slight harmonic for definition
      const osc3 = ctx.createOscillator();
      osc3.type = 'triangle';
      osc3.frequency.setValueAtTime(freq * 2, now);

      // Gain for each
      const gain1 = ctx.createGain();
      const gain2 = ctx.createGain();
      const gain3 = ctx.createGain();

      // Gentle attack, warm sustain, smooth release
      gain1.gain.setValueAtTime(0, now);
      gain1.gain.linearRampToValueAtTime(0.35, now + 0.02);
      gain1.gain.setValueAtTime(0.35, now + duration * 0.6);
      gain1.gain.exponentialRampToValueAtTime(0.001, now + duration);

      gain2.gain.setValueAtTime(0, now);
      gain2.gain.linearRampToValueAtTime(0.15, now + 0.02);
      gain2.gain.setValueAtTime(0.15, now + duration * 0.6);
      gain2.gain.exponentialRampToValueAtTime(0.001, now + duration);

      gain3.gain.setValueAtTime(0, now);
      gain3.gain.linearRampToValueAtTime(0.06, now + 0.01);
      gain3.gain.exponentialRampToValueAtTime(0.001, now + 0.15); // harmonic dies fast

      // Low-pass filter for warmth
      const filter = ctx.createBiquadFilter();
      filter.type = 'lowpass';
      filter.frequency.setValueAtTime(800, now);
      filter.Q.setValueAtTime(1, now);

      osc1.connect(gain1); gain1.connect(filter);
      osc2.connect(gain2); gain2.connect(filter);
      osc3.connect(gain3); gain3.connect(filter);
      filter.connect(ctx.destination);

      osc1.start(now); osc1.stop(now + duration + 0.1);
      osc2.start(now); osc2.stop(now + duration + 0.1);
      osc3.start(now); osc3.stop(now + duration + 0.1);
    }

    function PlayableKeyboard({ onBack }) {
      const [activeKeys, setActiveKeys] = useState(new Set());
      const [octave, setOctave] = useState(4);
      const [samplesLoaded, setSamplesLoaded] = useState(samplesReady);
      const [midiDevice, setMidiDevice] = useState(null);
      const [midiSupported, setMidiSupported] = useState(!!navigator.requestMIDIAccess);
      const numOctaves = 2;

      // Preload samples for current octave range
      useEffect(() => {
        const low = octave * 12;
        const high = low + (numOctaves + 1) * 12;
        preloadSamples(low, high).then(() => setSamplesLoaded(true));
      }, [octave]);

      // Web MIDI API — detect and connect to USB MIDI keyboards
      useEffect(() => {
        if (!navigator.requestMIDIAccess) return;
        let midiAccess = null;

        const onMIDIMessage = (e) => {
          const [status, note, velocity] = e.data;
          const command = status & 0xf0;
          if (command === 0x90 && velocity > 0) {
            // Note On
            playNoteStart(note, velocity);
            setActiveKeys(prev => new Set([...prev, note]));
            // Preload nearby samples if needed
            preloadSamples(note - 12, note + 12);
          } else if (command === 0x80 || (command === 0x90 && velocity === 0)) {
            // Note Off
            playNoteStop(note);
            setActiveKeys(prev => { const n = new Set(prev); n.delete(note); return n; });
          }
        };

        const connectInputs = (access) => {
          let deviceName = null;
          for (const input of access.inputs.values()) {
            input.onmidimessage = onMIDIMessage;
            deviceName = input.name;
          }
          setMidiDevice(deviceName);
        };

        navigator.requestMIDIAccess({ sysex: false }).then((access) => {
          midiAccess = access;
          connectInputs(access);
          // Listen for new devices being plugged in / removed
          access.onstatechange = () => {
            connectInputs(access);
            // Check if any inputs remain
            let hasInput = false;
            for (const input of access.inputs.values()) { hasInput = true; break; }
            if (!hasInput) setMidiDevice(null);
          };
          // Preload full range for MIDI keyboards
          preloadSamples(21, 108);
        }).catch(() => { setMidiSupported(false); });

        return () => {
          if (midiAccess) {
            for (const input of midiAccess.inputs.values()) {
              input.onmidimessage = null;
            }
          }
        };
      }, []);

      const handleKeyDown = (midiNote) => {
        playNote(midiNote, 1.5);
        setActiveKeys(prev => new Set([...prev, midiNote]));
        setTimeout(() => setActiveKeys(prev => { const n = new Set(prev); n.delete(midiNote); return n; }), 400);
      };

      // Keyboard shortcut mapping (bottom row = lower octave, middle row = upper)
      useEffect(() => {
        const keyMap = { 'a': 0, 'w': 1, 's': 2, 'e': 3, 'd': 4, 'f': 5, 't': 6, 'g': 7, 'y': 8, 'h': 9, 'u': 10, 'j': 11, 'k': 12, 'o': 13, 'l': 14, 'p': 15, ';': 16 };
        const handleKey = (e) => {
          if (e.repeat) return;
          const offset = keyMap[e.key.toLowerCase()];
          if (offset !== undefined) handleKeyDown(octave * 12 + offset);
        };
        window.addEventListener('keydown', handleKey);
        return () => window.removeEventListener('keydown', handleKey);
      }, [octave]);

      const startNote = octave * 12;
      const keys = [];
      for (let o = 0; o < numOctaves; o++) {
        for (let n = 0; n < 12; n++) {
          const midi = startNote + o * 12 + n;
          const isBlack = [1,3,6,8,10].includes(n);
          keys.push({ midi, note: n, isBlack, name: NOTE_NAMES[n] });
        }
      }
      // Add final C
      keys.push({ midi: startNote + numOctaves * 12, note: 0, isBlack: false, name: "C" });

      const whiteKeys = keys.filter(k => !k.isBlack);
      const blackKeys = keys.filter(k => k.isBlack);
      const whiteWidth = 100 / whiteKeys.length;

      // Calculate black key positions based on white key index
      const getBlackKeyPosition = (blackKey) => {
        const blackKeyIndex = keys.indexOf(blackKey);
        let whitesBefore = 0;
        for (let i = 0; i < blackKeyIndex; i++) {
          if (!keys[i].isBlack) whitesBefore++;
        }
        return (whitesBefore * whiteWidth) - (whiteWidth * 0.3);
      };

      return (
        <div style={{ ...styles.app, minHeight: "100vh" }}>
          <div className="student-top-bar" style={styles.topBar}>
            <div style={{ display: "flex", alignItems: "center", gap: "12px" }}>
              <button onClick={onBack} style={{ background: "none", border: "none", color: "#fff", cursor: "pointer", display: "flex", alignItems: "center", minWidth: 44, minHeight: 44, justifyContent: "center" }}><Icons.ArrowLeft /></button>
              <span className="logo-text" style={styles.logo}>Piano</span>
            </div>
          </div>

          <div className="student-container" style={{ ...styles.container, maxWidth: "700px" }}>
            <div className="student-card" style={{ ...styles.card, padding: "24px 16px" }}>
              <div style={{ display: "flex", justifyContent: "center", gap: "8px", marginBottom: "20px" }}>
                <label style={{ ...styles.label, margin: 0, display: "flex", alignItems: "center" }}>Octave</label>
                {[2,3,4,5,6].map(o => (
                  <button key={o} onClick={() => setOctave(o)} style={{
                    minWidth: 40, minHeight: 36, borderRadius: "8px", border: "none", cursor: "pointer",
                    fontSize: "14px", fontWeight: 600,
                    background: octave === o ? "linear-gradient(135deg, #d97706, #f59e0b)" : "rgba(0,0,0,0.04)",
                    color: octave === o ? "#fff" : "#64748b",
                  }}>{o}</button>
                ))}
              </div>

              <div style={{ position: "relative", height: "180px", userSelect: "none" }}>
                {/* White keys */}
                {whiteKeys.map((k, i) => (
                  <div key={k.midi} onMouseDown={() => handleKeyDown(k.midi)} onTouchStart={(e) => { e.preventDefault(); handleKeyDown(k.midi); }} style={{
                    position: "absolute", left: `${i * whiteWidth}%`, width: `${whiteWidth}%`,
                    height: "100%", background: activeKeys.has(k.midi) ? "#fef3c7" : "#fff",
                    border: "1px solid #cbd5e1", borderRadius: "0 0 6px 6px", cursor: "pointer",
                    display: "flex", alignItems: "flex-end", justifyContent: "center", paddingBottom: "8px",
                    fontSize: "11px", color: "#94a3b8", fontWeight: 500, transition: "background 0.1s",
                    boxSizing: "border-box",
                  }}>{k.name}</div>
                ))}
                {/* Black keys */}
                {blackKeys.map(k => (
                  <div key={k.midi} onMouseDown={() => handleKeyDown(k.midi)} onTouchStart={(e) => { e.preventDefault(); handleKeyDown(k.midi); }} style={{
                    position: "absolute", left: `${getBlackKeyPosition(k)}%`, width: `${whiteWidth * 0.6}%`,
                    height: "60%", background: activeKeys.has(k.midi) ? "#92400e" : "#1e293b",
                    borderRadius: "0 0 4px 4px", cursor: "pointer", zIndex: 2,
                    transition: "background 0.1s",
                  }} />
                ))}
              </div>
            </div>

            <p style={{ textAlign: "center", fontSize: "13px", color: "#94a3b8", marginTop: "12px" }}>
              Tap keys or use your computer keyboard (A-L for notes, W/E/T/Y/U/O/P for sharps/flats)
            </p>
            <p style={{ textAlign: "center", fontSize: "11px", color: samplesLoaded ? "#5a9a7a" : "#d97706", marginTop: "4px" }}>
              {samplesLoaded ? "♪ Salamander Grand Piano samples loaded" : "Loading piano samples..."}
            </p>
            {midiSupported && (
              <p style={{ textAlign: "center", fontSize: "11px", color: midiDevice ? "#5a9a7a" : "#94a3b8", marginTop: "2px" }}>
                {midiDevice ? ("🎹 MIDI connected: " + midiDevice) : "Plug in a USB MIDI keyboard to play"}
              </p>
            )}
          </div>
        </div>
      );
    }


    // ============================================================
    // EAR TRAINING
    // ============================================================

    const INTERVALS = [
      { name: "Minor 2nd", semitones: 1 },
      { name: "Major 2nd", semitones: 2 },
      { name: "Minor 3rd", semitones: 3 },
      { name: "Major 3rd", semitones: 4 },
      { name: "Perfect 4th", semitones: 5 },
      { name: "Tritone", semitones: 6 },
      { name: "Perfect 5th", semitones: 7 },
      { name: "Minor 6th", semitones: 8 },
      { name: "Major 6th", semitones: 9 },
      { name: "Minor 7th", semitones: 10 },
      { name: "Major 7th", semitones: 11 },
      { name: "Octave", semitones: 12 },
    ];

    // Count-in click sound (reusable across ear training)
    function playClickSound(isDownbeat) {
      const ctx = getAudioCtx();
      const now = ctx.currentTime;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.value = isDownbeat ? 1000 : 700;
      gain.gain.setValueAtTime(isDownbeat ? 0.3 : 0.15, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
      osc.start(now);
      osc.stop(now + 0.08);
    }

    function EarTraining({ onBack }) {
      const [mode, setMode] = useState("intervals"); // intervals or chords
      const [currentQuestion, setCurrentQuestion] = useState(null);
      const [answer, setAnswer] = useState(null);
      const [score, setScore] = useState({ correct: 0, total: 0 });
      const [streak, setStreak] = useState(0);
      const [countingIn, setCountingIn] = useState(false);
      const [countBeat, setCountBeat] = useState(0);
      const countInRef = useRef(null);

      // Adaptive ear training — track per-item stats
      const [earStats, setEarStats] = useState({});  // { "interval:Minor 3rd": { correct: 3, total: 5 }, ... }
      const [showStats, setShowStats] = useState(false);

      // Load ear training stats on mount
      useEffect(() => {
        const saved = sessionStorage.getItem('earTrainingStats');
        if (saved) try { setEarStats(JSON.parse(saved)); } catch(e) {}
      }, []);

      // Save stats whenever they change
      useEffect(() => {
        if (Object.keys(earStats).length > 0) {
          sessionStorage.setItem('earTrainingStats', JSON.stringify(earStats));
        }
      }, [earStats]);

      // Weighted random selection — items with lower accuracy get picked more often
      const weightedPick = (items, keyPrefix) => {
        const weights = items.map(item => {
          const key = keyPrefix + ':' + (item.name || item);
          const stat = earStats[key];
          if (!stat || stat.total < 2) return 3; // unknown items get high weight
          const accuracy = stat.correct / stat.total;
          // Lower accuracy = higher weight (inverse)
          return Math.max(0.5, 3 - (accuracy * 2.5));
        });
        const totalWeight = weights.reduce((a, b) => a + b, 0);
        let r = Math.random() * totalWeight;
        for (let i = 0; i < items.length; i++) {
          r -= weights[i];
          if (r <= 0) return items[i];
        }
        return items[items.length - 1];
      };

      const recordAnswer = (key, correct) => {
        setEarStats(prev => {
          const stat = prev[key] || { correct: 0, total: 0 };
          return { ...prev, [key]: { correct: stat.correct + (correct ? 1 : 0), total: stat.total + 1 } };
        });
      };

      // 4-beat count-in (2 beats per chord) then play
      const playWithCountIn = (callback) => {
        // Ensure audio context and trigger sample preload
        getAudioCtx();
        ensurePreload();
        setCountingIn(true);
        setCountBeat(0);

        // 2 beats per chord: beat gap = half the chord spacing
        // For progressions, this means 4 clicks span exactly 2 chords of time
        const beatGap = mode === "progressions" ? Math.max(progSpeed / 2, 200) : 400;
        let beat = 0;

        // Play first click immediately (downbeat of "bar 1")
        playClickSound(true);
        setCountBeat(1);
        beat = 1;

        countInRef.current = setInterval(() => {
          beat++;
          if (beat <= 4) {
            // Beat 3 is a downbeat (start of "bar 2")
            playClickSound(beat === 3);
            setCountBeat(beat);
          }
          if (beat === 4) {
            clearInterval(countInRef.current);
            // Play on the next downbeat
            setTimeout(() => {
              setCountingIn(false);
              setCountBeat(0);
              callback();
            }, beatGap);
          }
        }, beatGap);
      };

      // Cleanup on unmount
      useEffect(() => {
        return () => { if (countInRef.current) clearInterval(countInRef.current); };
      }, []);

      const playInterval = (semitones, rootMidi) => {
        playNote(rootMidi, 0.8);
        setTimeout(() => playNote(rootMidi + semitones, 0.8), 600);
      };

      const playChord = (intervals, rootMidi) => {
        intervals.forEach(i => playNote(rootMidi + i, 2.0));
        // Bass root — warm synth bass 2 octaves below
        playBassNote(rootMidi - 24, 2.0);
      };

      const newIntervalQuestion = () => {
        const rootMidi = 60 + Math.floor(Math.random() * 12);
        const interval = weightedPick(INTERVALS, 'interval');
        const q = { type: "interval", rootMidi, interval, semitones: interval.semitones };
        setCurrentQuestion(q);
        setAnswer(null);
        playWithCountIn(() => playInterval(q.semitones, q.rootMidi));
      };

      const QUIZ_CHORDS = [
        { name: "Major", intervals: [0, 4, 7] },
        { name: "Minor", intervals: [0, 3, 7] },
        { name: "Diminished", intervals: [0, 3, 6] },
        { name: "Augmented", intervals: [0, 4, 8] },
        { name: "Major 7th", intervals: [0, 4, 7, 11] },
        { name: "Dominant 7th", intervals: [0, 4, 7, 10] },
        { name: "Minor 7th", intervals: [0, 3, 7, 10] },
      ];

      // Diatonic chord progressions in major keys
      // Each chord: { numeral, semitonesFromRoot, intervals (from chord root) }
      const DIATONIC_CHORDS_MAJOR = {
        'I':    { semi: 0,  intervals: [0, 4, 7] },
        'ii':   { semi: 2,  intervals: [0, 3, 7] },
        'iii':  { semi: 4,  intervals: [0, 3, 7] },
        'IV':   { semi: 5,  intervals: [0, 4, 7] },
        'V':    { semi: 7,  intervals: [0, 4, 7] },
        'vi':   { semi: 9,  intervals: [0, 3, 7] },
        'vii°': { semi: 11, intervals: [0, 3, 6] },
        'Imaj7':  { semi: 0,  intervals: [0, 4, 7, 11] },
        'ii7':    { semi: 2,  intervals: [0, 3, 7, 10] },
        'iii7':   { semi: 4,  intervals: [0, 3, 7, 10] },
        'IVmaj7': { semi: 5,  intervals: [0, 4, 7, 11] },
        'V7':     { semi: 7,  intervals: [0, 4, 7, 10] },
        'vi7':    { semi: 9,  intervals: [0, 3, 7, 10] },
        'viiø7':  { semi: 11, intervals: [0, 3, 6, 10] },
      };

      const PROGRESSIONS = [
        { name: "ii - V - I",          chords: ['ii', 'V', 'I'],           category: "essential" },
        { name: "ii7 - V7 - Imaj7",    chords: ['ii7', 'V7', 'Imaj7'],    category: "essential" },
        { name: "I - IV - V - I",      chords: ['I', 'IV', 'V', 'I'],     category: "essential" },
        { name: "I - vi - ii - V",     chords: ['I', 'vi', 'ii', 'V'],    category: "essential" },
        { name: "I - V - vi - IV",     chords: ['I', 'V', 'vi', 'IV'],    category: "common" },
        { name: "I - IV - V",          chords: ['I', 'IV', 'V'],          category: "common" },
        { name: "vi - IV - I - V",     chords: ['vi', 'IV', 'I', 'V'],    category: "common" },
        { name: "I - vi - IV - V",     chords: ['I', 'vi', 'IV', 'V'],    category: "common" },
        { name: "iii - vi - ii - V",   chords: ['iii', 'vi', 'ii', 'V'],  category: "jazz" },
        { name: "Imaj7 - vi7 - ii7 - V7", chords: ['Imaj7', 'vi7', 'ii7', 'V7'], category: "jazz" },
        { name: "I - IV - vii° - iii - vi - ii - V - I", chords: ['I', 'IV', 'vii°', 'iii', 'vi', 'ii', 'V', 'I'], category: "jazz" },
        { name: "ii7 - V7 - Imaj7 - IVmaj7", chords: ['ii7', 'V7', 'Imaj7', 'IVmaj7'], category: "jazz" },
      ];

      const [progCategory, setProgCategory] = useState("all");
      const [progSpeed, setProgSpeed] = useState(2000); // ms between chords (2 beats)
      const [progBass, setProgBass] = useState(true); // play bass root note

      const playProgression = (chordNames, rootMidi, speed) => {
        const gap = speed || progSpeed;
        const dur = Math.max(gap / 1000 + 0.4, 1.0);
        // Play twice with a pause between
        for (let pass = 0; pass < 2; pass++) {
          const passOffset = pass * (chordNames.length * gap + gap); // gap between passes
          chordNames.forEach((name, i) => {
            const chord = DIATONIC_CHORDS_MAJOR[name];
            if (!chord) return;
            const chordRoot = rootMidi + chord.semi;
            setTimeout(() => {
              // Piano voicing
              chord.intervals.forEach(interval => playNote(chordRoot + interval, dur));
              // Bass root — warm synth bass 2 octaves below
              if (progBass) {
                playBassNote(chordRoot - 24, dur);
              }
            }, passOffset + i * gap);
          });
        }
      };

      const filteredProgressions = progCategory === "all" ? PROGRESSIONS : PROGRESSIONS.filter(p => p.category === progCategory);

      const newProgressionQuestion = () => {
        const rootMidi = 48 + Math.floor(Math.random() * 12); // C3 to B3
        const prog = weightedPick(filteredProgressions, 'progression');
        const q = { type: "progression", rootMidi, progression: prog };
        setCurrentQuestion(q);
        setAnswer(null);
        playWithCountIn(() => playProgression(prog.chords, rootMidi, progSpeed));
      };

      const newChordQuestion = () => {
        const rootMidi = 60 + Math.floor(Math.random() * 12);
        const chord = weightedPick(QUIZ_CHORDS, 'chord');
        const q = { type: "chord", rootMidi, chord };
        setCurrentQuestion(q);
        setAnswer(null);
        playWithCountIn(() => playChord(chord.intervals, rootMidi));
      };

      const checkAnswer = (guess) => {
        let correct, statKey;
        if (currentQuestion.type === "interval") {
          correct = guess === currentQuestion.interval.name;
          statKey = 'interval:' + currentQuestion.interval.name;
        } else if (currentQuestion.type === "chord") {
          correct = guess === currentQuestion.chord.name;
          statKey = 'chord:' + currentQuestion.chord.name;
        } else {
          correct = guess === currentQuestion.progression.name;
          statKey = 'progression:' + currentQuestion.progression.name;
        }
        setAnswer({ guess, correct });
        setScore(prev => ({ correct: prev.correct + (correct ? 1 : 0), total: prev.total + 1 }));
        setStreak(correct ? streak + 1 : 0);
        recordAnswer(statKey, correct);
      };

      const replayQuestion = () => {
        if (!currentQuestion || countingIn) return;
        playWithCountIn(() => {
          if (currentQuestion.type === "interval") playInterval(currentQuestion.semitones, currentQuestion.rootMidi);
          else if (currentQuestion.type === "chord") playChord(currentQuestion.chord.intervals, currentQuestion.rootMidi);
          else playProgression(currentQuestion.progression.chords, currentQuestion.rootMidi, progSpeed);
        });
      };

      const nextQuestion = mode === "intervals" ? newIntervalQuestion : mode === "chords" ? newChordQuestion : newProgressionQuestion;
      const options = mode === "intervals" ? INTERVALS.map(i => i.name) : mode === "chords" ? QUIZ_CHORDS.map(c => c.name) : filteredProgressions.map(p => p.name);
      const correctAnswer = currentQuestion ? (currentQuestion.type === "interval" ? currentQuestion.interval.name : currentQuestion.type === "chord" ? currentQuestion.chord.name : currentQuestion.progression.name) : null;

      return (
        <div style={{ ...styles.app, minHeight: "100vh" }}>
          <div className="student-top-bar" style={styles.topBar}>
            <div style={{ display: "flex", alignItems: "center", gap: "12px" }}>
              <button onClick={onBack} style={{ background: "none", border: "none", color: "#fff", cursor: "pointer", display: "flex", alignItems: "center", minWidth: 44, minHeight: 44, justifyContent: "center" }}><Icons.ArrowLeft /></button>
              <span className="logo-text" style={styles.logo}>Ear Training</span>
            </div>
          </div>

          <div className="student-container" style={{ ...styles.container, maxWidth: "600px" }}>
            {/* Mode toggle */}
            <div className="student-card" style={{ ...styles.card, display: "flex", gap: "8px", padding: "16px", flexWrap: "wrap" }}>
              {["intervals", "chords", "progressions"].map(m => (
                <button key={m} onClick={() => { setMode(m); setCurrentQuestion(null); setAnswer(null); setScore({ correct: 0, total: 0 }); setStreak(0); }} style={{
                  flex: 1, padding: "10px", borderRadius: "10px", border: "none", cursor: "pointer",
                  fontSize: "14px", fontWeight: 600, textTransform: "capitalize", minWidth: "90px",
                  background: mode === m ? "linear-gradient(135deg, #d97706, #f59e0b)" : "rgba(0,0,0,0.03)",
                  color: mode === m ? "#fff" : "#64748b",
                }}>{m}</button>
              ))}
            </div>

            {/* Progression category filter */}
            {mode === "progressions" && (
              <div className="student-card" style={{ ...styles.card, display: "flex", gap: "6px", padding: "12px 16px", flexWrap: "wrap" }}>
                {["all", "essential", "common", "jazz"].map(cat => (
                  <button key={cat} onClick={() => { setProgCategory(cat); setCurrentQuestion(null); setAnswer(null); }} style={{

    function LessonViewer({ lessonHtml, title, track, type, onBack, contentId, token, onSave, canEdit }) {
      const [editing, setEditing] = useState(false);
      const [saving, setSaving] = useState(false);
      const [saved, setSaved] = useState(false);
      const editorRef = useRef(null);
      const fileInputRef = useRef(null);

      const handleImageUpload = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const formData = new FormData();
        formData.append('image', file);
        try {
          const res = await fetch(API_BASE + 'upload.php', {
            method: 'POST',
            headers: { 'Authorization': 'Bearer ' + token },
            body: formData
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || 'Upload failed');
          execCmd('insertHTML', '<img src="' + data.url + '" style="max-width:100%;height:auto;border-radius:8px;margin:12px 0;" />');
        } catch (err) {
          alert('Image upload failed: ' + err.message);
        }
        e.target.value = '';
      };

      const execCmd = (cmd, value) => {
        document.execCommand(cmd, false, value || null);
        editorRef.current && editorRef.current.focus();
      };

      const handleSave = async () => {
        if (!editorRef.current || !contentId) return;
        setSaving(true);
        try {
          const html = editorRef.current.innerHTML;
          await apiFetch("content.php?id=" + contentId, {
            method: "PUT",
            body: JSON.stringify({ lesson_content: html })
          }, token);
          if (onSave) onSave(contentId, html);
          setSaved(true);
          setTimeout(() => setSaved(false), 2000);
        } catch (err) {
          alert("Save failed: " + err.message);
        } finally {
          setSaving(false);
        }
      };

      const toolbarBtn = (label, cmd, value) => (
        <button
          key={cmd + (value || "")}
          onMouseDown={e => { e.preventDefault(); execCmd(cmd, value); }}
          style={{ background: "rgba(255,255,255,0.1)", border: "1px solid rgba(255,255,255,0.15)", color: "#fff", borderRadius: "4px", padding: "4px 8px", cursor: "pointer", fontSize: "12px", fontWeight: 600, minWidth: "28px" }}
          title={label}
        >{label}</button>
      );

      return (
        <div style={{ ...styles.app, minHeight: "100vh" }}>
          <div style={styles.topBar}>
            <div style={{ display: "flex", alignItems: "center", gap: "12px", flex: 1 }}>
              <button onClick={onBack} style={{ background: "none", border: "none", color: "#fbbf24", cursor: "pointer", display: "flex", alignItems: "center", minWidth: 44, minHeight: 44, justifyContent: "center" }}><Icons.ArrowLeft /></button>
              <WoodshedLogo size={28} />
            </div>
            <div className="lesson-toolbar" style={{ display: "flex", gap: "8px", alignItems: "center" }}>
              {canEdit && !editing && (
                <button onClick={() => setEditing(true)} style={{ ...styles.switchBtn, display: "flex", alignItems: "center", gap: "6px" }}>
                  <Icons.Edit /> Edit
                </button>
              )}
              {editing && (
                <button onClick={() => { handleSave(); setEditing(false); }} style={{ ...styles.switchBtn, display: "flex", alignItems: "center", gap: "6px", background: "rgba(16,185,129,0.3)" }}>
                  {saving ? "Saving..." : saved ? "Saved!" : "Done Editing"}
                </button>
              )}
              <button onClick={() => window.print()} style={{ ...styles.switchBtn, display: "flex", alignItems: "center", gap: "6px" }}>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
                Print
              </button>
            </div>

    // ============================================================
    // TEACHER OBSERVATIONS PANEL
    // ============================================================

    function TeacherObservations({ studentId, token }) {
      const [observations, setObservations] = useState([]);
      const [newNote, setNewNote] = useState("");
      const [saving, setSaving] = useState(false);
      const [expanding, setExpanding] = useState(false);

      const fetchObservations = async () => {
        try {
          const res = await fetch(API_BASE + "learning.php?action=observations&student_id=" + studentId, {
            headers: { "Content-Type": "application/json", "Authorization": "Bearer " + token }
          });
          const text = await res.text();
                    if (text) {
            const data = JSON.parse(text);
            if (Array.isArray(data)) setObservations(data);
          }
        } catch (e) { console.error("fetchObservations error:", e); }
      };

      useEffect(() => { fetchObservations(); }, [studentId]);

      const handleAdd = async () => {
        if (!newNote.trim()) return;
        setSaving(true);
        try {
          const res = await fetch(API_BASE + "learning.php?action=observations&student_id=" + studentId, {
            method: "POST",
            headers: { "Content-Type": "application/json", "Authorization": "Bearer " + token },
            body: JSON.stringify({ note: newNote.trim() })
          });
          const text = await res.text();
          if (res.status >= 400) { const err = text ? JSON.parse(text) : {}; throw new Error(err.error || "Server error " + res.status); }
          if (text) {
            const data = JSON.parse(text);
            if (!res.ok) throw new Error(data.error || "API error " + res.status);
          }
          setNewNote("");
          await fetchObservations();
        } catch (e) { alert("Failed: " + e.message); }
        setSaving(false);
      };

      const handleDelete = async (id) => {
        try {
          await apiFetch("learning.php?action=observations&student_id=" + studentId + "&id=" + id, { method: "DELETE" }, token);
          await fetchObservations();
        } catch (e) { alert("Failed: " + e.message); }
      };

      const formatDate = (d) => {
        const date = new Date(d);
        const now = new Date();
        const diff = Math.floor((now - date) / 86400000);
        if (diff === 0) return "Today " + date.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
        if (diff === 1) return "Yesterday";
        if (diff < 7) return diff + "d ago";
        return date.toLocaleDateString([], { day: "numeric", month: "short", year: date.getFullYear() !== now.getFullYear() ? "numeric" : undefined });
      };

      return (
        <div>
          <div style={{ display: "flex", flexDirection: "column", gap: "8px", marginBottom: "16px" }}>
            <div style={{ display: "flex", gap: "8px" }}>
              <input value={newNote} onChange={e => setNewNote(e.target.value)} placeholder="Add a lesson observation... (shorthand ok!)"
                onKeyDown={e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); handleAdd(); } }}
                style={{ ...styles.input, flex: 1, fontSize: "13px" }} />
              <button onClick={handleAdd} disabled={saving || !newNote.trim()} style={{ ...styles.btnPrimary, whiteSpace: "nowrap", opacity: !newNote.trim() ? 0.5 : 1 }}>
                {saving ? "..." : "Add"}
              </button>
            </div>
            {newNote.trim() && (
              <div style={{ display: "flex", gap: "6px", alignItems: "center" }}>
                <button onClick={async () => {
                  setExpanding(true);
                  try {
                    const data = await aiCall("expand_observation", { shorthand: newNote }, token);
                    console.log("AI response:", data);
                    if (data && data.expanded) {
                      setNewNote(data.expanded);
                    } else {
                      console.error("No expanded field in response:", data);
                    }
                  } catch (e) {
                    console.error("AI expand error:", e);
                  } finally {
                    setExpanding(false);
                  }
                }} disabled={expanding} style={{
                  padding: "3px 10px", borderRadius: "8px", border: "1px solid rgba(217,119,6,0.25)",
                  background: expanding ? "rgba(217,119,6,0.1)" : "transparent",
                  cursor: expanding ? "wait" : "pointer", fontSize: "11px", color: "#d97706",
                  display: "flex", alignItems: "center", gap: "4px", fontWeight: 500
                }}>
                  <AIIcons.Sparkle /> {expanding ? "Thinking..." : "Tidy up with AI"}
                </button>
                <span style={{ fontSize: "11px", color: "#94a3b8" }}>Expands shorthand into proper notes</span>
              </div>
            )}
          </div>
          {observations.length === 0 ? (
            <p style={{ fontSize: "13px", color: "#94a3b8", fontStyle: "italic" }}>No observations yet. Add notes during lessons to track how this student learns.</p>
          ) : (
            <div style={{ display: "flex", flexDirection: "column", gap: "8px" }}>
              {observations.map(obs => (
                <div key={obs.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", padding: "10px 12px", background: "#f8fafc", borderRadius: "8px", border: "1px solid #f1f5f9" }}>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontSize: "13px", color: "#1e293b", lineHeight: 1.5 }}>{obs.note}</div>
                    <div style={{ fontSize: "11px", color: "#94a3b8", marginTop: "4px" }}>{formatDate(obs.createdAt)}</div>
                  </div>
                  <button onClick={() => handleDelete(obs.id)} style={{ background: "none", border: "none", cursor: "pointer", color: "#94a3b8", padding: "4px", marginLeft: "8px" }} title="Delete"><Icons.Trash /></button>
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }

    // ============================================================
    // STUDENT TOOLBOX ACCESS (per-student scale/chord visibility)
    // ============================================================

    function StudentToolboxAccess({ studentId, studentName, token }) {
      const [allowedScales, setAllowedScales] = useState(null); // null = all allowed
      const [allowedChords, setAllowedChords] = useState(null);
      const [saving, setSaving] = useState(false);
      const [saved, setSaved] = useState(false);
      const [loaded, setLoaded] = useState(false);

      useEffect(() => {
        (async () => {
          try {
            const data = await apiFetch('learning.php?action=toolbox_access&student_id=' + studentId, {}, token);
            if (data && data.allowed_scales) setAllowedScales(data.allowed_scales);
            if (data && data.allowed_chords) setAllowedChords(data.allowed_chords);
          } catch (e) { /* defaults: all allowed */ }
          setLoaded(true);
        })();
      }, [studentId]);

      const handleSave = async () => {
        setSaving(true);
        try {
          await apiFetch('learning.php?action=toolbox_access&student_id=' + studentId, {
            method: 'POST',
            body: JSON.stringify({
              allowed_scales: allowedScales,
              allowed_chords: allowedChords,
            })
          }, token);
          setSaved(true);
          setTimeout(() => setSaved(false), 2000);
        } catch (err) {
          alert("Save failed: " + err.message);
        } finally {
          setSaving(false);
        }
      };

      const toggleScale = (name) => {
        if (allowedScales === null) {
          // Switching from "all" to selective — start with all checked, then uncheck this one
          setAllowedScales(SCALE_TYPES.map(s => s.name).filter(n => n !== name));
        } else if (allowedScales.includes(name)) {
          setAllowedScales(allowedScales.filter(n => n !== name));
        } else {
          const newList = [...allowedScales, name];
          // If all are now selected, revert to null (= all)
          if (newList.length >= SCALE_TYPES.length) {
            setAllowedScales(null);
          } else {
            setAllowedScales(newList);
          }
        }
      };

      const toggleChord = (name) => {
        if (allowedChords === null) {
          setAllowedChords(CHORD_TYPES.map(c => c.name).filter(n => n !== name));
        } else if (allowedChords.includes(name)) {
          setAllowedChords(allowedChords.filter(n => n !== name));
        } else {
          const newList = [...allowedChords, name];
          if (newList.length >= CHORD_TYPES.length) {
            setAllowedChords(null);
          } else {
            setAllowedChords(newList);
          }
        }
      };

      const isScaleAllowed = (name) => allowedScales === null || allowedScales.includes(name);
      const isChordAllowed = (name) => allowedChords === null || allowedChords.includes(name);

      if (!loaded) return <p style={{ color: "#94a3b8" }}>Loading...</p>;

      return (
        <div>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "16px" }}>
            <div style={{ fontSize: "13px", color: "#64748b" }}>
              Choose which scales and chords {studentName.split(" ")[0]} can see in their toolbox.
              {allowedScales === null && allowedChords === null && " Currently showing all."}
            </div>
            <button style={{ ...styles.btnPrimary, opacity: saving ? 0.7 : 1 }} onClick={handleSave} disabled={saving}>
              {saving ? "Saving..." : saved ? "Saved!" : "Save"}
            </button>
          </div>

          <div style={styles.card}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "12px" }}>
              <div style={{ fontSize: "14px", fontWeight: 600, color: "#1e293b" }}>Scales</div>
              <button onClick={() => setAllowedScales(allowedScales === null ? [] : null)} style={{ fontSize: "12px", color: "#d97706", background: "none", border: "none", cursor: "pointer", textDecoration: "underline" }}>
                {allowedScales === null ? "Deselect All" : "Select All"}
              </button>
            </div>
            <div style={{ display: "flex", gap: "6px", flexWrap: "wrap" }}>
              {SCALE_TYPES.map(s => (
                <button key={s.name} onClick={() => toggleScale(s.name)} style={{
                  padding: "6px 14px", borderRadius: "8px", fontSize: "13px", cursor: "pointer",
                  border: isScaleAllowed(s.name) ? "2px solid #10b981" : "1px solid #e2e8f0",
                  background: isScaleAllowed(s.name) ? "rgba(16,185,129,0.08)" : "#fff",
                  color: isScaleAllowed(s.name) ? "#059669" : "#94a3b8",
                  fontWeight: isScaleAllowed(s.name) ? 600 : 400,
                }}>{s.name}</button>
              ))}
            </div>
          </div>

          <div style={{ ...styles.card, marginTop: "12px" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "12px" }}>
              <div style={{ fontSize: "14px", fontWeight: 600, color: "#1e293b" }}>Chords</div>
              <button onClick={() => setAllowedChords(allowedChords === null ? [] : null)} style={{ fontSize: "12px", color: "#d97706", background: "none", border: "none", cursor: "pointer", textDecoration: "underline" }}>
                {allowedChords === null ? "Deselect All" : "Select All"}
              </button>
            </div>
            <div style={{ display: "flex", gap: "6px", flexWrap: "wrap" }}>
              {CHORD_TYPES.map(c => (
                <button key={c.name} onClick={() => toggleChord(c.name)} style={{
                  padding: "6px 14px", borderRadius: "8px", fontSize: "13px", cursor: "pointer",
                  border: isChordAllowed(c.name) ? "2px solid #10b981" : "1px solid #e2e8f0",
                  background: isChordAllowed(c.name) ? "rgba(16,185,129,0.08)" : "#fff",
                  color: isChordAllowed(c.name) ? "#059669" : "#94a3b8",
                  fontWeight: isChordAllowed(c.name) ? 600 : 400,
                }}>{c.name}</button>
              ))}
            </div>
          </div>
        </div>
      );
    }

    function AISuggestAssignment({ studentId, studentName, token, onAssignmentCreated }) {
      const [suggestion, setSuggestion] = useState(null);
      const [loading, setLoading] = useState(false);
      const [creating, setCreating] = useState(false);
      const [error, setError] = useState("");
      const [expanded, setExpanded] = useState(false);

      const generateSuggestion = async () => {
        setLoading(true);
        setError("");
        try {
          const data = await aiCall("suggest_practice", { student_id: studentId }, token);
          setSuggestion(data.suggestion);
          setExpanded(true);
        } catch (err) {
          setError(err.message || "Failed to generate suggestion");
        } finally {
          setLoading(false);
        }
      };

      const acceptSuggestion = async () => {
        if (!suggestion) return;
        setCreating(true);
        try {
          // Create any new content items first
          const stepData = [];
          for (const step of suggestion.steps) {
            if (step.source === "new" && step.new_description) {
              const res = await apiFetch("content.php", {
                method: "POST",
                body: JSON.stringify({
                  title: step.title,
                  type: step.type || "Practice",
                  track: step.track || "Foundation",
                  description: step.new_description,
                })
              }, token);
              stepData.push({ contentId: res.id, notes: step.notes || "" });
            } else if (step.content_id) {
              stepData.push({ contentId: step.content_id, notes: step.notes || "" });
            }
          }

          // Create the assignment
          await apiFetch("assignments.php", {
            method: "POST",
            body: JSON.stringify({
              studentId: studentId,
              weekLabel: suggestion.week_label || "AI-suggested practice",
              steps: stepData,
            })
          }, token);

          setSuggestion(null);
          setExpanded(false);
          if (onAssignmentCreated) onAssignmentCreated();
        } catch (err) {
          setError(err.message || "Failed to create assignment");
        } finally {
          setCreating(false);
        }
      };

      if (!suggestion && !loading) {
        return (
          <button onClick={generateSuggestion} style={{
            background: "linear-gradient(135deg, rgba(16,185,129,0.08), rgba(217,119,6,0.08))",
            border: "1px solid rgba(16,185,129,0.2)", borderRadius: "10px", padding: "10px 16px",
            cursor: "pointer", fontSize: "13px", color: "#059669", fontWeight: 500,
            display: "flex", alignItems: "center", gap: "8px", width: "100%", justifyContent: "center",
            transition: "all 0.2s"
          }}>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M8 12l2 2 4-4"/></svg>
            AI Suggest Next Assignment
          </button>
        );
      }

      if (loading) {
        return (
          <div style={{
            background: "linear-gradient(135deg, rgba(16,185,129,0.06), rgba(217,119,6,0.06))",
            border: "1px solid rgba(16,185,129,0.15)", borderRadius: "10px", padding: "20px",
            textAlign: "center"
          }}>
            <div style={{ fontSize: "13px", color: "#059669", fontWeight: 500 }}>
              <span style={{ display: "inline-block", animation: "pulse 1.5s ease-in-out infinite" }}>Analysing {studentName}&#39;s history and your library...</span>
            </div>
          </div>
        );
      }

      if (error) {
        return (
          <div style={{ padding: "12px", background: "rgba(239,68,68,0.06)", borderRadius: "10px", border: "1px solid rgba(239,68,68,0.15)" }}>
            <div style={{ fontSize: "13px", color: "#dc2626" }}>{error}</div>
            <button onClick={generateSuggestion} style={{ background: "rgba(16,185,129,0.08)", border: "none", cursor: "pointer", padding: "6px 12px", borderRadius: "8px", fontSize: "12px", color: "#059669", marginTop: "8px" }}>Retry</button>
          </div>
        );
      }

      return (
        <div style={{
          background: "linear-gradient(135deg, rgba(16,185,129,0.04), rgba(217,119,6,0.04))",
          border: "1px solid rgba(16,185,129,0.12)", borderRadius: "10px", overflow: "hidden"
        }}>
          <div onClick={() => setExpanded(!expanded)} style={{
            padding: "12px 16px", cursor: "pointer", display: "flex", justifyContent: "space-between", alignItems: "center",
            background: "rgba(16,185,129,0.06)"
          }}>
            <div style={{ display: "flex", alignItems: "center", gap: "8px" }}>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#059669" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M8 12l2 2 4-4"/></svg>
              <span style={{ fontSize: "13px", fontWeight: 600, color: "#059669" }}>Suggested Assignment</span>
            </div>
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#059669" strokeWidth="2" style={{ transform: expanded ? "rotate(180deg)" : "none", transition: "transform 0.2s" }}><polyline points="6 9 12 15 18 9"/></svg>
          </div>
          {expanded && suggestion && (
            <div style={{ padding: "16px" }}>
              {suggestion.rationale && (
                <p style={{ fontSize: "13px", color: "#64748b", fontStyle: "italic", margin: "0 0 12px 0" }}>{suggestion.rationale}</p>
              )}
              <div style={{ fontSize: "13px", fontWeight: 600, color: "#1e293b", marginBottom: "8px" }}>{suggestion.week_label}</div>
              <div style={{ display: "flex", flexDirection: "column", gap: "6px" }}>
                {(suggestion.steps || []).map((step, i) => (
                  <div key={i} style={{
                    display: "flex", alignItems: "center", gap: "10px", padding: "8px 12px",
                    background: step.source === "new" ? "rgba(245,158,11,0.06)" : "rgba(241,245,249,0.8)",

                <button onClick={() => { setSuggestion(null); setExpanded(false); }} style={{

                  cursor: "pointer", fontSize: "13px", color: "#64748b"

                <button onClick={acceptSuggestion} disabled={creating} style={{
                  background: "linear-gradient(135deg, #059669, #10b981)", border: "none", borderRadius: "8px",
                  padding: "8px 20px", cursor: creating ? "wait" : "pointer", fontSize: "13px", fontWeight: 600,
                  color: "#fff", opacity: creating ? 0.7 : 1
                }}>{creating ? "Creating..." : "Accept & Create Assignment"}</button>
              </div>
            </div>
          )}
        </div>
      );
    }

          await apiFetch(`students.php?id=${id}`, { method: 'DELETE' }, token);
          await onRefreshStudents();
        } catch (err) {
          setError(err.message);
        }
      };

      const handleUpdateStudent = async () => {
        try {
          await apiFetch(`students.php?id=${editingStudentId}`, { method: 'PUT', body: JSON.stringify(editForm) }, token);
          setEditingStudentId(null);
          await onRefreshStudents();

        }
      };

      const startEditStudent = (student) => {
        setEditingStudentId(student.id);
        setEditForm({ name: student.name || "", level: student.level || "", notes: student.notes || "" });
      };

      const copyStudentLink = (student) => {
        const url = `${window.location.origin}${window.location.pathname}?student=${student.id}`;
        navigator.clipboard.writeText(url).then(() => {
          setCopiedId(student.id);
          setTimeout(() => setCopiedId(null), 2000);

      };

      return (
        <div>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: "32px" }}>

              <h1 style={styles.pageTitle}>Students</h1>

              <div style={styles.emptyTitle}>No students yet</div>

            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(320px, 1fr))", gap: "20px" }}>

                const studentAssignments = assignments.filter(a => a.studentId === student.id);
                const latestAssignment = studentAssignments[0];
                const latestProgress = latestAssignment ? (latestAssignment.progress || []).filter(p => p.completed) : [];

    async function aiCall(action, data, token) {
      const headers = { 'Content-Type': 'application/json' };
      if (token) headers['Authorization'] = `Bearer ${token}`;
      const res = await fetch(`${API_BASE}ai.php?action=${action}`, {
        method: 'POST', headers, body: JSON.stringify(data)
      });
      const result = await res.json();
      if (!res.ok) throw new Error(result.error || 'AI request failed');
      return result;
    }

    function GenerateLessonButton({ content, token, onLessonGenerated }) {

              content_id: content.id,
              brief: content.description || content.title,

              track: content.track,
              type: content.type,

          }, token);
          if (result.lesson && result.lesson.lesson_html) {

    function YouTubeImportModal({ onClose, onAdd, token }) {
      const [mode, setMode] = useState("single"); // single or bulk
      const [url, setUrl] = useState("");
      const [bulkUrls, setBulkUrls] = useState("");
      const [loading, setLoading] = useState(false);
      const [results, setResults] = useState([]);
      const [error, setError] = useState("");
      const [refiningIndex, setRefiningIndex] = useState(null);

      const handleSingleImport = async () => {
        if (!url.trim()) return;
        setLoading(true); setError("");
        try {
          const data = await aiCall('youtube_import', { url }, token);
          setResults([{ youtube: data.youtube, content: data.content, selected: true, correction: "", editing: false }]);
        } catch (err) { setError(err.message); }
        finally { setLoading(false); }
      };

      const handleBulkImport = async () => {
        const urls = bulkUrls.split('\n').map(u => u.trim()).filter(u => u);
        if (urls.length === 0) return;
        setLoading(true); setError("");
        try {
          const data = await aiCall('youtube_bulk_import', { urls }, token);
          setResults(data.items.map(item => ({ ...item, selected: true, correction: "", editing: false })));
        } catch (err) { setError(err.message); }
        finally { setLoading(false); }
      };

      const toggleSelect = (i) => {
        const updated = [...results];
        updated[i].selected = !updated[i].selected;
        setResults(updated);
      };

      const updateContentField = (i, field, value) => {
        const updated = [...results];
        updated[i].content = { ...updated[i].content, [field]: value };
        setResults(updated);
      };

      const handleRefine = async (i) => {
        const r = results[i];
        if (!r.correction.trim()) return;
        setRefiningIndex(i);
        try {
          const data = await aiCall('youtube_refine', {
            original: r.content,
            correction: r.correction,
            youtubeTitle: r.youtube?.title || '',
            youtubeAuthor: r.youtube?.author || ''
          }, token);
          if (data.content) {
            const updated = [...results];
            updated[i].content = data.content;
            updated[i].correction = "";
            setResults(updated);
          }
        } catch (err) { setError(err.message); }
        finally { setRefiningIndex(null); }
      };

      const handleAddSelected = () => {
        results.filter(r => r.selected && r.content && !r.error).forEach(r => {
          onAdd({ ...r.content, url: r.youtube.url });
        });
      };

      const typeOptions = ["Watch", "Play", "Practice", "Listen", "Review"];
      const trackOptions = ["Jazz", "Contemporary", "Foundation", "Crossover"];

      return (
        <Modal onClose={onClose}>
          <div style={{ display: "flex", alignItems: "center", gap: "8px", marginBottom: "20px" }}>
            <span style={{ color: "#c44040" }}><AIIcons.Youtube /></span>
            <span style={styles.modalTitle}>YouTube Import</span>
          </div>

          <div style={{ display: "flex", gap: "8px", marginBottom: "16px" }}>
            <button onClick={() => setMode("single")} style={mode === "single" ? aiButtonActiveStyle : aiButtonStyle}>Single Video</button>
            <button onClick={() => setMode("bulk")} style={mode === "bulk" ? aiButtonActiveStyle : aiButtonStyle}>Bulk Import</button>
          </div>

          {mode === "single" ? (
            <div style={styles.formGroup}>
              <label style={styles.label}>YouTube URL</label>
              <input style={styles.input} value={url} onChange={e => setUrl(e.target.value)} placeholder="https://youtube.com/watch?v=..." />
            </div>
          ) : (
            <div style={styles.formGroup}>
              <label style={styles.label}>Paste YouTube URLs (one per line)</label>
              <textarea style={{ ...styles.textarea, minHeight: "120px" }} value={bulkUrls} onChange={e => setBulkUrls(e.target.value)}
                placeholder={"https://youtube.com/watch?v=abc123\nhttps://youtube.com/watch?v=def456\nhttps://youtu.be/ghi789"} />
            </div>
          )}

          {results.length === 0 && (
            <div style={{ display: "flex", gap: "12px" }}>
              <button style={{ ...styles.btnGhost, flex: 1 }} onClick={onClose}>Cancel</button>
              <button style={{ ...aiButtonActiveStyle, flex: 2, justifyContent: "center", padding: "12px", opacity: loading ? 0.7 : 1 }}
                onClick={mode === "single" ? handleSingleImport : handleBulkImport} disabled={loading}>
                <AIIcons.Sparkle /> {loading ? `Importing${mode === "bulk" ? ` (${bulkUrls.split('\n').filter(u => u.trim()).length} videos)` : ""}...` : "Import & Describe"}
              </button>
            </div>
          )}

          {error && <ErrorBanner message={error} onDismiss={() => setError("")} />}

          {results.length > 0 && (
            <div style={{ marginTop: "16px" }}>
              {results.map((r, i) => (
                <div key={i} style={{ ...styles.card, opacity: r.selected ? 1 : 0.5 }}>
                  {r.error ? (
                    <div style={{ color: "#dc2626", fontSize: "13px" }}>Failed: {r.url || r.error}</div>
                  ) : (
                    <div>
                      {/* Header row with checkbox and YouTube info */}
                      <div style={{ display: "flex", alignItems: "center", gap: "8px", marginBottom: "12px" }}>
                        <div style={{ ...styles.stepCheck(r.selected), width: "22px", height: "22px", cursor: "pointer", flexShrink: 0 }} onClick={() => toggleSelect(i)}>
                          {r.selected && <Icons.Check />}
                        </div>
                        <div style={{ flex: 1, minWidth: 0 }}>
                          <div style={{ fontSize: "11px", color: "#94a3b8", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                            {r.youtube?.title}
                          </div>
                          {r.youtube?.author && <div style={{ fontSize: "11px", color: "#d97706" }}>by {r.youtube.author}</div>}
                        </div>
                      </div>

                      {/* Editable fields */}
                      <div style={{ marginLeft: "30px" }}>
                        <div style={{ marginBottom: "8px" }}>
                          <input style={{ ...styles.input, fontWeight: 500, fontSize: "14px" }}
                            value={r.content?.title || ""} onChange={e => updateContentField(i, 'title', e.target.value)}
                            placeholder="Title" />
                        </div>
                        <div style={{ display: "flex", gap: "8px", marginBottom: "8px" }}>
                          <select style={{ ...styles.input, flex: 1 }} value={r.content?.type || "Watch"} onChange={e => updateContentField(i, 'type', e.target.value)}>

                            {trackOptions.map(t => <option key={t} value={t}>{t}</option>)}
                          </select>

                        <div style={{ marginBottom: "8px" }}>
                          <textarea style={{ ...styles.textarea, minHeight: "50px", fontSize: "12px" }}

                        {/* AI correction input */}
                        <div style={{ display: "flex", gap: "6px", alignItems: "center" }}>
                          <input style={{ ...styles.input, flex: 1, fontSize: "12px" }}

          await onRefreshContent();

          setError(err.message);
        }

          await onRefreshContent();
        } catch (err) {
          setError(err.message);
        }
      };

    function TeacherAssignments({ students, contentLibrary, assignments, progress, token, onRefreshAssignments, onRefreshContent }) {
      const [showBuilder, setShowBuilder] = useState(false);
      const [showAIPathBuilder, setShowAIPathBuilder] = useState(false);
      const [editingAssignment, setEditingAssignment] = useState(null);
      const [error, setError] = useState("");

      const handleSaveAssignment = async (data) => {
        try {
          if (data.id) {
            await apiFetch(`assignments.php?id=${data.id}`, { method: 'PUT', body: JSON.stringify(data) }, token);
          } else {
            await apiFetch('assignments.php', { method: 'POST', body: JSON.stringify(data) }, token);
          }
          await onRefreshAssignments();
        } catch (err) {
          setError(err.message);
        }
      };

      const handleRemoveAssignment = async (id) => {
        try {
          await apiFetch(`assignments.php?id=${id}`, { method: 'DELETE' }, token);
          await onRefreshAssignments();
        } catch (err) {
          setError(err.message);
        }
      };

      if (students.length === 0 || contentLibrary.length === 0) {
        return (
          <div>
            <h1 style={styles.pageTitle}>Assignments</h1>
            <p style={styles.pageSubtitle}>Weekly practice paths for your students</p>
            <div style={styles.emptyState}>
              <div style={styles.emptyTitle}>Add students and content first</div>
              <p>You need at least one student and one piece of content in your library to create an assignment.</p>
            </div>
          </div>
        );
      }

      return (
        <div>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: "32px" }}>
            <div>
              <h1 style={styles.pageTitle}>Assignments</h1>
              <p style={styles.pageSubtitle}>Weekly practice paths for your students</p>
            </div>
            <div style={{ display: "flex", gap: "8px" }}>
              <button onClick={() => setShowAIPathBuilder(true)} style={aiButtonStyle}>
                <AIIcons.Zap /> AI Build Path
              </button>
              <button style={styles.btnPrimary} onClick={() => setShowBuilder(true)}>
                <span style={{ display: "flex", alignItems: "center", gap: "6px" }}><Icons.Plus /> New Assignment</span>
              </button>
            </div>
          </div>

          <ErrorBanner message={error} onDismiss={() => setError("")} />

          {assignments.length === 0 ? (
            <div style={styles.emptyState}>
              <div style={styles.emptyTitle}>No assignments yet</div>
              <p>Create your first weekly practice path for a student.</p>
            </div>
          ) : (
            assignments.map(assignment => {
              const student = students.find(s => s.id === assignment.studentId);
              const assignmentProgress = (assignment.progress || []).filter(p => p.completed);
              const pct = assignment.steps.length > 0 ? Math.round((assignmentProgress.length / assignment.steps.length) * 100) : 0;

              return (
                <div key={assignment.id} style={styles.card}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                    <div>
                      <div style={styles.cardTitle}>{student?.name || assignment.student_name || "Unknown"} -- {assignment.weekLabel}</div>
                      <div style={styles.cardSub}>{assignmentProgress.length} of {assignment.steps.length} steps completed</div>
                    </div>
                    <div style={{ display: "flex", gap: "8px" }}>
                      <button style={{ ...styles.btnGhost, padding: "6px 8px", fontSize: "14px" }} onClick={() => { const idx = assignments.indexOf(assignment); handleMoveAssignment(idx, -1); }} title="Move up">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><polyline points="18 15 12 9 6 15"/></svg>
                      </button>
                      <button style={{ ...styles.btnGhost, padding: "6px 8px", fontSize: "14px" }} onClick={() => { const idx = assignments.indexOf(assignment); handleMoveAssignment(idx, 1); }} title="Move down">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><polyline points="6 9 12 15 18 9"/></svg>
                      </button>
                      <button style={styles.btnGhost} onClick={() => { setEditingAssignment(assignment); setShowBuilder(true); }}>
                        <span style={{ display: "flex", alignItems: "center", gap: "4px" }}><Icons.Edit /> Edit</span>
                      </button>
                      <button style={styles.btnDanger} onClick={() => handleRemoveAssignment(assignment.id)}><Icons.Trash /></button>
                    </div>
                  </div>
                  <div style={styles.progressBar}><div style={styles.progressFill(pct)} /></div>
                  <div style={{ marginTop: "16px" }}>
                    {assignment.steps.map((step, i) => {
                      const content = contentLibrary.find(c => c.id === step.contentId) || { title: step.content_title, type: step.content_type, track: step.content_track };
                      const stepProgress = (assignment.progress || []).find(p => (p.stepId === step.id || p.step_id === step.id));
                      const completed = stepProgress?.completed;
                      const fb = stepProgress?.feedback ? FEEDBACK_OPTIONS.find(f => f.value === stepProgress.feedback) : null;

                      return (
                        <div key={step.id} style={styles.stepItem(completed)}>
                          <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: "12px", color: "#d97706", width: "24px", marginTop: "4px" }}>{i + 1}.</span>
                          <div style={styles.stepCheck(completed)}>
                            {completed && <Icons.Check />}
                          </div>
                          <div style={{ flex: 1 }}>
                            <div style={{ fontSize: "14px", color: "#1e293b", fontWeight: 500 }}>{content?.title || "Unknown content"}</div>
                            {step.notes && <div style={{ fontSize: "12px", color: "#64748b", marginTop: "2px" }}>{step.notes}</div>}
                            <div style={{ display: "flex", gap: "6px", marginTop: "4px", alignItems: "center" }}>
                              {content && <span style={styles.tag(content.track)}>{content.track}</span>}
                              {content && <span style={styles.contentTypeIcon}>{contentTypeLabel(content.type)}</span>}
                              {fb && <span style={{ fontSize: "12px", color: "#64748b" }}>{fb.emoji} {fb.label}</span>}
                              {stepProgress?.practiceSeconds > 0 && <span style={{ fontSize: "12px", color: "#94a3b8" }}>({Math.floor(stepProgress.practiceSeconds / 60)}m practised)</span>}
                              {stepProgress?.audioUrl && <audio controls src={API_BASE.replace("/api/", "/") + stepProgress.audioUrl} style={{ height: "28px", maxWidth: "200px" }} />}
                              {(stepProgress?.feedbackNote || stepProgress?.feedback_note) && <span style={{ fontSize: "12px", color: "#64748b", fontStyle: "italic" }}>-- "{stepProgress.feedbackNote || stepProgress.feedback_note}"</span>}
                            </div>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              );
            })
          )}

          {showBuilder && (
            <AssignmentBuilderModal
              onClose={() => { setShowBuilder(false); setEditingAssignment(null); }}
              onSave={handleSaveAssignment}
              students={students}
              contentLibrary={contentLibrary}
              existingAssignment={editingAssignment}
            />
          )}
          {showAIPathBuilder && (
            <AIPathBuilderModal
              onClose={() => setShowAIPathBuilder(false)}
              onBuild={async ({ studentId, path }) => {
                // Create new content items for "new" steps first
                const stepEntries = [];
                for (const step of (path.steps || [])) {
                  if (step.source === "new" && step.new_description) {
                    try {
                      const newContent = await apiFetch('content.php', {
                        method: 'POST',
                        body: JSON.stringify({ title: step.title, type: step.type, track: step.track, description: step.new_description })
                      }, token);
                      stepEntries.push({ contentId: newContent.id, notes: step.notes || "" });
                    } catch (e) {
                      setError("Failed to create content: " + step.title);
                    }
                  } else if (step.content_id) {
                    stepEntries.push({ contentId: step.content_id, notes: step.notes || "" });
                  }
                }
                // Create the assignment
                if (stepEntries.length > 0) {
                  await handleSaveAssignment({
                    studentId,
                    weekLabel: path.week_label || "AI-generated practice path",
                    steps: stepEntries.map((s, i) => ({ id: generateId(), ...s, order: i + 1 }))
                  });
                  if (onRefreshContent) await onRefreshContent();
                }
                setShowAIPathBuilder(false);
              }}
              students={students}
              token={token}
            />
          )}
        </div>
      );
    }

    function StudentView({ studentId, student, token, onBack, isStudentAuth }) {
      const [viewingStudentLesson, setViewingStudentLesson] = useState(null);
      const timerSecondsRef = useRef({});
      const [assignments, setAssignments] = useState([]);
      const [progress, setProgress] = useState([]);
      const [contentLibrary, setContentLibrary] = useState([]);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState("");
      const [showFeedback, setShowFeedback] = useState(null);
      const [viewingPast, setViewingPast] = useState(false);
      const [pastAssignmentId, setPastAssignmentId] = useState(null);
      const [activeTab, setActiveTab] = useState("practice");
      const [activeTool, setActiveTool] = useState(null); // "metronome" | "chords" | null
      const [allowedScales, setAllowedScales] = useState(null);
      const [allowedChords, setAllowedChords] = useState(null);

      const loadData = useCallback(async () => {
        try {
          const promises = [
            apiFetch(`assignments.php?student_id=${studentId}`, {}, token),
            apiFetch(`progress.php?student_id=${studentId}`, {}, token),
          ];
          // Student tokens cannot fetch content library; assignment steps include content data inline
          if (!isStudentAuth) {
            promises.push(apiFetch('content.php', {}, token));
          }
          const results = await Promise.all(promises);
          setAssignments(results[0]);
          setProgress(results[1]);
          if (results[2]) setContentLibrary(results[2]);
          // Load toolbox access settings
          try {
            const tbAccess = await apiFetch('learning.php?action=toolbox_access&student_id=' + studentId, {}, token);
            if (tbAccess && tbAccess.allowed_scales) setAllowedScales(tbAccess.allowed_scales);
            if (tbAccess && tbAccess.allowed_chords) setAllowedChords(tbAccess.allowed_chords);
          } catch (e) { /* use defaults: all */ }
        } catch (err) {
          setError(err.message);
        } finally {
          setLoading(false);
        }
      }, [studentId, token, isStudentAuth]);

      useEffect(() => { loadData(); }, [loadData]);

      // Full-screen tools
      if (activeTool === "metronome") return <Metronome onBack={() => setActiveTool(null)} />;
      if (activeTool === "chords") return <ChordReference onBack={() => setActiveTool(null)} allowedChords={allowedChords} token={token} canEdit={!isStudentAuth} />;
      if (activeTool === "scales") return <ScaleReference onBack={() => setActiveTool(null)} allowedScales={allowedScales} token={token} canEdit={!isStudentAuth} />;
      if (activeTool === "keyboard") return <PlayableKeyboard onBack={() => setActiveTool(null)} />;
      if (activeTool === "eartraining") return <EarTraining onBack={() => setActiveTool(null)} />;
      if (activeTool === "backingtracks") return <BackingTracks onBack={() => setActiveTool(null)} token={token} />;

      const studentName = student?.name || "Student";

      // Full lesson viewer for student
      if (viewingStudentLesson) {
        return (
          <LessonViewer
            lessonHtml={viewingStudentLesson.html}
            title={viewingStudentLesson.title || "Lesson"}
            track={viewingStudentLesson.track}
            type={viewingStudentLesson.type}
            canEdit={false}
            onBack={() => setViewingStudentLesson(null)}
          />
        );
      }

      if (loading) return (
        <div style={{ ...styles.app, minHeight: "100vh" }}>
          <div className="student-top-bar" style={{ ...styles.topBar, justifyContent: "space-between" }}>
            <div style={{ display: "flex", alignItems: "center", gap: "12px" }}>
