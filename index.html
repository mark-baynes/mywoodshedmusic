    }

    function TeacherAssignments({ students, contentLibrary, assignments, progress, token, onRefreshAssignments, onRefreshContent }) {
      const [showBuilder, setShowBuilder] = useState(false);
      const [showAIPathBuilder, setShowAIPathBuilder] = useState(false);
      const [editingAssignment, setEditingAssignment] = useState(null);
      const [error, setError] = useState("");

      const handleSaveAssignment = async (data) => {
        try {
          if (data.id) {
            await apiFetch(`assignments.php?id=${data.id}`, { method: 'PUT', body: JSON.stringify(data) }, token);
          } else {
            await apiFetch('assignments.php', { method: 'POST', body: JSON.stringify(data) }, token);
          }
          await onRefreshAssignments();
        } catch (err) {
          setError(err.message);
        }
      };

      const handleRemoveAssignment = async (id) => {
        try {
          await apiFetch(`assignments.php?id=${id}`, { method: 'DELETE' }, token);
          await onRefreshAssignments();
        } catch (err) {
          setError(err.message);
        }
      };

      if (students.length === 0 || contentLibrary.length === 0) {
        return (
          <div>
            <h1 style={styles.pageTitle}>Assignments</h1>
            <p style={styles.pageSubtitle}>Weekly practice paths for your students</p>
            <div style={styles.emptyState}>
              <div style={styles.emptyTitle}>Add students and content first</div>
              <p>You need at least one student and one piece of content in your library to create an assignment.</p>
            </div>
          </div>
        );
      }

      return (
        <div>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: "32px" }}>
            <div>
              <h1 style={styles.pageTitle}>Assignments</h1>
              <p style={styles.pageSubtitle}>Weekly practice paths for your students</p>
            </div>
            <div style={{ display: "flex", gap: "8px" }}>
              <button onClick={() => setShowAIPathBuilder(true)} style={aiButtonStyle}>
                <AIIcons.Zap /> AI Build Path
              </button>
              <button style={styles.btnPrimary} onClick={() => setShowBuilder(true)}>
                <span style={{ display: "flex", alignItems: "center", gap: "6px" }}><Icons.Plus /> New Assignment</span>
              </button>
            </div>
          </div>

          <ErrorBanner message={error} onDismiss={() => setError("")} />

          {assignments.length === 0 ? (
            <div style={styles.emptyState}>
              <div style={styles.emptyTitle}>No assignments yet</div>
              <p>Create your first weekly practice path for a student.</p>
            </div>
          ) : (
            assignments.map(assignment => {
              const student = students.find(s => s.id === assignment.studentId);
              const assignmentProgress = (assignment.progress || []).filter(p => p.completed);
              const pct = assignment.steps.length > 0 ? Math.round((assignmentProgress.length / assignment.steps.length) * 100) : 0;

              return (
                <div key={assignment.id} style={styles.card}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                    <div>
                      <div style={styles.cardTitle}>{student?.name || assignment.student_name || "Unknown"} -- {assignment.weekLabel}</div>
                      <div style={styles.cardSub}>{assignmentProgress.length} of {assignment.steps.length} steps completed</div>
                    </div>
                    <div style={{ display: "flex", gap: "8px" }}>
                      <button style={styles.btnGhost} onClick={() => { setEditingAssignment(assignment); setShowBuilder(true); }}>
                        <span style={{ display: "flex", alignItems: "center", gap: "4px" }}><Icons.Edit /> Edit</span>
                      </button>
                      <button style={styles.btnDanger} onClick={() => handleRemoveAssignment(assignment.id)}><Icons.Trash /></button>
                    </div>
                  </div>
                  <div style={styles.progressBar}><div style={styles.progressFill(pct)} /></div>
                  <div style={{ marginTop: "16px" }}>
                    {assignment.steps.map((step, i) => {
                      const content = contentLibrary.find(c => c.id === step.contentId) || { title: step.content_title, type: step.content_type, track: step.content_track };
                      const stepProgress = (assignment.progress || []).find(p => (p.stepId === step.id || p.step_id === step.id));
                      const completed = stepProgress?.completed;
                      const fb = stepProgress?.feedback ? FEEDBACK_OPTIONS.find(f => f.value === stepProgress.feedback) : null;

                      return (
                        <div key={step.id} style={styles.stepItem(completed)}>
                          <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: "12px", color: "#b8863e", width: "24px", marginTop: "4px" }}>{i + 1}.</span>
                          <div style={styles.stepCheck(completed)}>
                            {completed && <Icons.Check />}
                          </div>
                          <div style={{ flex: 1 }}>
                            <div style={{ fontSize: "14px", color: "#3d2e1e", fontWeight: 500 }}>{content?.title || "Unknown content"}</div>
                            {step.notes && <div style={{ fontSize: "12px", color: "#8a7560", marginTop: "2px" }}>{step.notes}</div>}
                            <div style={{ display: "flex", gap: "6px", marginTop: "4px", alignItems: "center" }}>
                              {content && <span style={styles.tag(content.track)}>{content.track}</span>}
                              {content && <span style={styles.contentTypeIcon}>{content.type}</span>}
                              {fb && <span style={{ fontSize: "12px", color: "#8a7560" }}>{fb.emoji} {fb.label}</span>}
                              {(stepProgress?.feedbackNote || stepProgress?.feedback_note) && <span style={{ fontSize: "12px", color: "#8a7560", fontStyle: "italic" }}>-- "{stepProgress.feedbackNote || stepProgress.feedback_note}"</span>}
                            </div>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              );
            })
          )}

          {showBuilder && (
            <AssignmentBuilderModal
              onClose={() => { setShowBuilder(false); setEditingAssignment(null); }}
              onSave={handleSaveAssignment}
              students={students}
              contentLibrary={contentLibrary}
              existingAssignment={editingAssignment}
            />
          )}
          {showAIPathBuilder && (
            <AIPathBuilderModal
              onClose={() => setShowAIPathBuilder(false)}
              onBuild={async ({ studentId, path }) => {
                // Create new content items for "new" steps first
                const stepEntries = [];
                for (const step of (path.steps || [])) {
                  if (step.source === "new" && step.new_description) {
                    try {
                      const newContent = await apiFetch('content.php', {
                        method: 'POST',
                        body: JSON.stringify({ title: step.title, type: step.type, track: step.track, description: step.new_description })
                      }, token);
                      stepEntries.push({ contentId: newContent.id, notes: step.notes || "" });
                    } catch (e) {
                      setError("Failed to create content: " + step.title);
                    }
                  } else if (step.content_id) {
                    stepEntries.push({ contentId: step.content_id, notes: step.notes || "" });
                  }
                }
                // Create the assignment
                if (stepEntries.length > 0) {
                  await handleSaveAssignment({
                    studentId,
                    weekLabel: path.week_label || "AI-generated practice path",
                    steps: stepEntries.map((s, i) => ({ id: generateId(), ...s, order: i + 1 }))
                  });
                  if (onRefreshContent) await onRefreshContent();
                }
                setShowAIPathBuilder(false);
              }}
              students={students}
              token={token}
            />
          )}
        </div>
      );
    }

    // ============================================================
    // STUDENT VIEW (mobile-optimised, with toolbox tabs)
    // ============================================================

    function StudentView({ studentId, student, token, onBack, isStudentAuth }) {
      const [viewingStudentLesson, setViewingStudentLesson] = useState(null);
      const [assignments, setAssignments] = useState([]);
      const [progress, setProgress] = useState([]);
      const [contentLibrary, setContentLibrary] = useState([]);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState("");
      const [showFeedback, setShowFeedback] = useState(null);
      const [viewingPast, setViewingPast] = useState(false);
      const [pastAssignmentId, setPastAssignmentId] = useState(null);
      const [activeTab, setActiveTab] = useState("practice");
      const [activeTool, setActiveTool] = useState(null); // "metronome" | "chords" | null

      const loadData = useCallback(async () => {
        try {
          const promises = [
            apiFetch(`assignments.php?student_id=${studentId}`, {}, token),
            apiFetch(`progress.php?student_id=${studentId}`, {}, token),
          ];
          // Student tokens cannot fetch content library; assignment steps include content data inline
          if (!isStudentAuth) {
            promises.push(apiFetch('content.php', {}, token));
          }
          const results = await Promise.all(promises);
          setAssignments(results[0]);
          setProgress(results[1]);
          if (results[2]) setContentLibrary(results[2]);
        } catch (err) {
          setError(err.message);
        } finally {
          setLoading(false);
        }
      }, [studentId, token, isStudentAuth]);

      useEffect(() => { loadData(); }, [loadData]);

      // Full-screen tools
      if (activeTool === "metronome") return <Metronome onBack={() => setActiveTool(null)} />;
      if (activeTool === "chords") return <ChordReference onBack={() => setActiveTool(null)} />;

      const studentName = student?.name || "Student";

      // Full lesson viewer for student
      if (viewingStudentLesson) {
        return (
          <LessonViewer
            lessonHtml={viewingStudentLesson.html}
            title={viewingStudentLesson.title || "Lesson"}
            track={viewingStudentLesson.track}
            type={viewingStudentLesson.type}
            onBack={() => setViewingStudentLesson(null)}
          />
        );
      }

      if (loading) return (
        <div style={{ ...styles.app, minHeight: "100vh" }}>
          <div className="student-top-bar" style={{ ...styles.topBar, justifyContent: "space-between" }}>
            <div style={{ display: "flex", alignItems: "center", gap: "12px" }}>
              {onBack && <button onClick={onBack} style={{ background: "none", border: "none", color: "#e8c878", cursor: "pointer", display: "flex", alignItems: "center", minWidth: 44, minHeight: 44, justifyContent: "center" }}><Icons.ArrowLeft /></button>}
              <span className="logo-text" style={styles.logo}>My <span style={styles.logoAccent}>Woodshed</span> Music</span>
            </div>
          </div>
          <div style={styles.container}><Loading message="Loading your practice..." /></div>
        </div>
      );

      const latestAssignment = assignments[0];
      const activeAssignment = viewingPast ? assignments.find(a => a.id === pastAssignmentId) : latestAssignment;

      const getStepProgress = (assignmentId, stepId) => {
        const fromAssignment = (activeAssignment?.progress || []).find(p => (p.stepId === stepId || p.step_id === stepId) && p.completed);
        if (fromAssignment) return fromAssignment;
        return progress.find(p => (p.assignmentId === assignmentId || p.assignment_id === assignmentId) && (p.stepId === stepId || p.step_id === stepId) && p.completed);
      };

      const completedSteps = activeAssignment?.steps?.filter(s => getStepProgress(activeAssignment.id, s.id))?.length || 0;
      const totalSteps = activeAssignment?.steps?.length || 0;
      const pct = totalSteps > 0 ? Math.round((completedSteps / totalSteps) * 100) : 0;
      const allDone = completedSteps === totalSteps && totalSteps > 0;
      const totalCompleted = progress.filter(p => p.completed).length;

      const handleComplete = (stepId) => {
        const step = activeAssignment.steps.find(s => s.id === stepId);
        const content = contentLibrary.find(c => c.id === step?.contentId);
        setShowFeedback({ stepId, title: content?.title || step?.content_title || "This step" });
      };

      const submitFeedback = async (stepId, feedback, feedbackNote) => {
        setShowFeedback(null);
        try {
          await apiFetch('progress.php', {
            method: 'POST',
            body: JSON.stringify({ studentId, assignmentId: activeAssignment.id, stepId, completed: true, feedback, feedbackNote }),
          }, token);
          await loadData();
        } catch (err) {
          setError(err.message);
        }
      };

      const nextStepIndex = activeAssignment?.steps?.findIndex(s => !getStepProgress(activeAssignment.id, s.id)) ?? -1;

      return (
        <div style={{ ...styles.app, minHeight: "100vh" }}>
          <div className="student-top-bar" style={{ ...styles.topBar, justifyContent: "space-between" }}>
            <div style={{ display: "flex", alignItems: "center", gap: "12px" }}>
              {onBack && <button onClick={onBack} style={{ background: "none", border: "none", color: "#e8c878", cursor: "pointer", display: "flex", alignItems: "center", minWidth: 44, minHeight: 44, justifyContent: "center" }}><Icons.ArrowLeft /></button>}
              <span className="logo-text" style={styles.logo}>My <span style={styles.logoAccent}>Woodshed</span> Music</span>
            </div>
            <div style={{ display: "flex", alignItems: "center", gap: "8px" }}>
              <div style={{ color: "rgba(255,255,255,0.6)", fontSize: "13px" }}>{studentName}</div>
              {isStudentAuth && (
                <button onClick={onBack} style={{ ...styles.switchBtn, display: "flex", alignItems: "center", gap: "6px", marginLeft: "4px", fontSize: "12px" }} title="Sign out">
                  <Icons.Logout />
                </button>
              )}
            </div>
          </div>

          <div className="student-main-content" style={{ minHeight: "calc(100vh - 56px)" }}>
            {activeTab === "practice" ? (
              <div className="student-container" style={styles.container}>
                <ErrorBanner message={error} onDismiss={() => setError("")} />

                <div className="student-card" style={{ ...styles.card, background: "linear-gradient(135deg, rgba(228,180,60,0.06), rgba(90,154,122,0.04))", border: "1px solid rgba(200,150,60,0.1)" }}>
                  <h1 className="student-page-title" style={{ ...styles.pageTitle, fontSize: "24px" }}>
                    {allDone && !viewingPast ? "Week complete! Nice work." : `Welcome back, ${studentName.split(" ")[0]}`}
                  </h1>
                  {activeAssignment && !allDone && (
                    <p style={{ fontSize: "14px", color: "#8a7560", marginTop: "4px" }}>{activeAssignment.weekLabel} -- {completedSteps} of {totalSteps} steps done. Keep going!</p>
                  )}
                  <div style={{ display: "flex", gap: "12px", marginTop: "12px", flexWrap: "wrap" }}>
                    {totalCompleted > 0 && <div style={styles.streak}><Icons.Fire /> {totalCompleted} steps completed total</div>}
                    {pct === 100 && !viewingPast && <div style={{ ...styles.streak, background: "rgba(90,154,122,0.12)", color: "#4a8a6a" }}><Icons.Check /> All done this week!</div>}
                  </div>
                  {activeAssignment && (
                    <div style={{ ...styles.progressBar, marginTop: "16px" }}><div style={styles.progressFill(pct)} /></div>
                  )}
                </div>

                {allDone && !viewingPast && assignments.length > 1 && (
                  <div className="student-card" style={{ ...styles.card, textAlign: "center", padding: "32px" }}>
                    <div style={{ fontFamily: "'Playfair Display', Georgia, serif", fontSize: "20px", color: "#3d2e1e", marginBottom: "8px" }}>Want to revisit something?</div>
                    <p style={{ fontSize: "14px", color: "#8a7560", marginBottom: "20px" }}>You can go back to previous weeks and work on anything you'd like to polish.</p>
                    <div style={{ display: "flex", gap: "12px", justifyContent: "center", flexWrap: "wrap" }}>
                      {assignments.slice(1).map(a => (
                        <button key={a.id} onClick={() => { setViewingPast(true); setPastAssignmentId(a.id); }} style={styles.btnSecondary}>{a.weekLabel}</button>
                      ))}
                    </div>
                  </div>
                )}

                {viewingPast && (
                  <div style={{ marginBottom: "16px" }}>
                    <button onClick={() => { setViewingPast(false); setPastAssignmentId(null); }} style={styles.btnGhost}>
                      <span style={{ display: "flex", alignItems: "center", gap: "6px" }}><Icons.ArrowLeft /> Back to current week</span>
                    </button>
                  </div>
                )}

                {activeAssignment ? (
                  <div className="student-card" style={styles.card}>
                    <div style={styles.cardTitle}>{activeAssignment.weekLabel}</div>
                    <div style={styles.cardSub}>{totalSteps} steps -- work through them in order</div>

                    {activeAssignment.steps.map((step, i) => {
                      const content = contentLibrary.find(c => c.id === step.contentId) || { title: step.content_title, type: step.content_type, track: step.content_track, description: step.content_description, url: step.content_url, lesson_content: step.content_lesson_content };
                      const completed = !!getStepProgress(activeAssignment.id, step.id);
                      const isNext = i === nextStepIndex && !viewingPast;
                      const progressEntry = getStepProgress(activeAssignment.id, step.id);
                      const fb = progressEntry?.feedback ? FEEDBACK_OPTIONS.find(f => f.value === progressEntry.feedback) : null;

                      return (
                        <div key={step.id} className="student-step-item" style={{
                          ...styles.stepItem(false),
                          opacity: completed ? 0.55 : (isNext ? 1 : 0.8),
                          background: isNext ? "rgba(212,152,58,0.04)" : "transparent",
                          borderRadius: isNext ? "10px" : "0",
                          padding: isNext ? "16px 12px" : "14px 0",
                          marginLeft: isNext ? "-12px" : "0",
                          marginRight: isNext ? "-12px" : "0",
                        }}>
                          <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: "12px", color: "#b8863e", width: "24px", marginTop: "4px" }}>{i + 1}.</span>
                          <div
                            className="student-step-check"
                            style={styles.stepCheck(completed)}
                            onClick={() => { if (!completed && (i <= nextStepIndex || viewingPast)) handleComplete(step.id); }}
                          >
                            {completed && <Icons.Check />}
                          </div>
                          <div style={{ flex: 1 }}>
                            <div style={styles.contentTypeIcon}>{content?.type || "Practice"}</div>
                            <div className="student-step-title" style={{ fontSize: "15px", color: "#3d2e1e", fontWeight: 500 }}>{content?.title || "Untitled"}</div>
                            {step.notes && <div style={{ fontSize: "13px", color: "#5a4a38", marginTop: "4px", lineHeight: 1.5 }}>{step.notes}</div>}
                            {content?.description && <div style={{ fontSize: "13px", color: "#8a7560", marginTop: "4px", lineHeight: 1.5 }}>{content.description}</div>}
                            {content?.url && (
                              <a href={content.url} target="_blank" rel="noopener noreferrer" style={{ display: "inline-flex", alignItems: "center", gap: "4px", fontSize: "12px", color: "#b8863e", marginTop: "6px", textDecoration: "none" }}>
                                <Icons.Link /> Open resource
                              </a>
                            )}
                            {(content?.lesson_content) && (
                              <button onClick={() => setViewingStudentLesson({ html: content.lesson_content, title: content.title, track: content.track, type: content.type })} style={{ display: "inline-flex", alignItems: "center", gap: "4px", fontSize: "12px", color: "#5a9a7a", background: "rgba(90,154,122,0.08)", border: "1px solid rgba(90,154,122,0.15)", borderRadius: "6px", padding: "5px 10px", cursor: "pointer", marginTop: "6px" }}>
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
                                View Full Lesson
                              </button>
                            )}
                            <div style={{ display: "flex", gap: "6px", marginTop: "6px", alignItems: "center" }}>
                              {content && <span style={styles.tag(content.track)}>{content.track}</span>}
                              {fb && <span style={{ fontSize: "12px", color: "#8a7560" }}>{fb.emoji} {fb.label}</span>}
                            </div>
                            {isNext && !completed && (
                              <button className="student-mark-complete" onClick={() => handleComplete(step.id)} style={{ ...styles.btnPrimary, marginTop: "12px", fontSize: "13px", padding: "8px 20px" }}>
                                Mark Complete
                              </button>
                            )}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                ) : (
                  <div style={styles.emptyState}>
                    <div style={styles.emptyTitle}>No practice assigned yet</div>
                    <p>Your teacher hasn't set up this week's practice yet. Check back soon!</p>
                  </div>
                )}
              </div>
            ) : (
              <Toolbox
                onOpenMetronome={() => setActiveTool("metronome")}
                onOpenChords={() => setActiveTool("chords")}
              />
            )}
          </div>

          {/* Mobile bottom navigation */}
          <div className="mobile-bottom-nav" style={{
            position: "fixed", bottom: 0, left: 0, right: 0,
            background: "#3d2e1e", padding: "0",
            boxShadow: "0 -2px 12px rgba(30,20,10,0.15)", zIndex: 100,
            justifyContent: "space-around", alignItems: "stretch",
          }}>
            <button onClick={() => setActiveTab("practice")} style={{
              flex: 1, padding: "10px 0", border: "none", cursor: "pointer",
              background: "transparent", display: "flex", flexDirection: "column", alignItems: "center", gap: "2px",
              color: activeTab === "practice" ? "#e8c878" : "rgba(255,255,255,0.4)",
              minHeight: 56,
            }}>
              <Icons.Music />
              <span style={{ fontSize: "10px", fontWeight: 600 }}>Practice</span>
            </button>
            <button onClick={() => setActiveTab("toolbox")} style={{
              flex: 1, padding: "10px 0", border: "none", cursor: "pointer",
              background: "transparent", display: "flex", flexDirection: "column", alignItems: "center", gap: "2px",
              color: activeTab === "toolbox" ? "#e8c878" : "rgba(255,255,255,0.4)",
              minHeight: 56,
            }}>
              <Icons.Wrench />
              <span style={{ fontSize: "10px", fontWeight: 600 }}>Toolbox</span>
            </button>
          </div>

          {/* Desktop toolbox tab bar (visible above 768px, inline in the layout) */}
          <div style={{
            position: "fixed", bottom: 0, left: 0, right: 0,
            background: "#3d2e1e", padding: "0",
            boxShadow: "0 -2px 12px rgba(30,20,10,0.15)", zIndex: 99,
            display: "flex", justifyContent: "center", alignItems: "stretch",
          }} className="mobile-bottom-nav">
            {/* This is the mobile nav, hidden on desktop via CSS class */}
          </div>

          {/* Desktop: show tab switcher in the content area instead */}
          {typeof window !== 'undefined' && window.innerWidth > 768 && (
            <div style={{
              position: "fixed", bottom: "24px", right: "24px",
              display: "flex", gap: "8px", zIndex: 90,
            }}>
              <button onClick={() => setActiveTab("practice")} style={{
                ...styles.btnSmall, padding: "10px 20px", borderRadius: "24px",
                background: activeTab === "practice" ? "#3d2e1e" : "rgba(60,40,20,0.08)",
                color: activeTab === "practice" ? "#e8c878" : "#8a7560",
                border: "1px solid rgba(60,40,20,0.1)", cursor: "pointer",
                boxShadow: "0 2px 12px rgba(30,20,10,0.1)",
                display: "flex", alignItems: "center", gap: "6px", fontSize: "13px",
              }}>
                <Icons.Music /> Practice
              </button>
              <button onClick={() => setActiveTab("toolbox")} style={{
                ...styles.btnSmall, padding: "10px 20px", borderRadius: "24px",
                background: activeTab === "toolbox" ? "#3d2e1e" : "rgba(60,40,20,0.08)",
                color: activeTab === "toolbox" ? "#e8c878" : "#8a7560",
                border: "1px solid rgba(60,40,20,0.1)", cursor: "pointer",
                boxShadow: "0 2px 12px rgba(30,20,10,0.1)",
                display: "flex", alignItems: "center", gap: "6px", fontSize: "13px",
              }}>
                <Icons.Wrench /> Toolbox
              </button>
            </div>
          )}

          {showFeedback && (
            <FeedbackModal
              stepTitle={showFeedback.title}
              onClose={() => setShowFeedback(null)}
              onSubmit={(feedback, note) => submitFeedback(showFeedback.stepId, feedback, note)}
            />
          )}
        </div>
      );
    }

    // ============================================================
    // MAIN APP
    // ============================================================

    function App() {
      // Auth state -- token stored in React state, NOT localStorage
      const [token, setToken] = useState(null);
      const [teacher, setTeacher] = useState(null);
      const [studentAuth, setStudentAuth] = useState(null); // { token, student } when logged in as student

      // Data state
      const [students, setStudents] = useState([]);
      const [contentLibrary, setContentLibrary] = useState([]);
      const [assignments, setAssignments] = useState([]);
      const [progress, setProgress] = useState([]);

      // UI state
      const [mode, setMode] = useState("teacher");
      const [teacherPage, setTeacherPage] = useState("students");
      const [selectedStudentId, setSelectedStudentId] = useState(null);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState("");
      const [viewingLesson, setViewingLesson] = useState(null);

      // Data fetchers
      const fetchStudents = useCallback(async () => {
        if (!token) return;
        const data = await apiFetch('students.php', {}, token);
        setStudents(data);
        return data;
      }, [token]);

      const fetchContent = useCallback(async () => {
        if (!token) return;
        const data = await apiFetch('content.php', {}, token);
        setContentLibrary(data);
        return data;
      }, [token]);

      const fetchAssignments = useCallback(async () => {
        if (!token) return;
        const data = await apiFetch('assignments.php', {}, token);
        setAssignments(data);
        return data;
      }, [token]);

      const fetchAllProgress = useCallback(async (studentList) => {
        if (!token) return;
        const list = studentList || students;
        if (list.length === 0) { setProgress([]); return; }
        const allProgress = [];
        for (const s of list) {
          try {
            const data = await apiFetch(`progress.php?student_id=${s.id}`, {}, token);
            allProgress.push(...data);
          } catch (e) { /* skip errors for individual students */ }
        }
        setProgress(allProgress);
      }, [token, students]);

      // Load all data after login
      const loadAllData = useCallback(async () => {
        if (!token) return;
        setLoading(true);
        try {
          const [studentsData, contentData, assignmentsData] = await Promise.all([
            apiFetch('students.php', {}, token),
            apiFetch('content.php', {}, token),
            apiFetch('assignments.php', {}, token),
          ]);
          setStudents(studentsData);
          setContentLibrary(contentData);
          setAssignments(assignmentsData);

          const allProgress = [];
          for (const s of studentsData) {
            try {
              const data = await apiFetch(`progress.php?student_id=${s.id}`, {}, token);
              allProgress.push(...data);
            } catch (e) { /* skip */ }
          }
          setProgress(allProgress);
        } catch (err) {
          setError(err.message);
        } finally {
          setLoading(false);
        }
      }, [token]);

      useEffect(() => {
        if (token) loadAllData();
      }, [token, loadAllData]);

      // Refresh helpers
      const refreshStudents = async () => {
        const data = await apiFetch('students.php', {}, token);
        setStudents(data);
        const allProgress = [];
        for (const s of data) {
          try {
            const p = await apiFetch(`progress.php?student_id=${s.id}`, {}, token);
            allProgress.push(...p);
          } catch (e) { /* skip */ }
        }
        setProgress(allProgress);
      };

      const refreshAssignments = async () => {
        const data = await apiFetch('assignments.php', {}, token);
        setAssignments(data);
      };

      const refreshContent = async () => {
        const data = await apiFetch('content.php', {}, token);
        setContentLibrary(data);
      };

      // Auth handlers
      const handleAuth = (newToken, teacherData) => {
        setToken(newToken);
        setTeacher(teacherData);
        setStudentAuth(null);
      };

      const handleStudentAuth = (studentToken, studentData) => {
        setStudentAuth({ token: studentToken, student: studentData });
        // Clear URL param
        if (window.history.replaceState) {
          window.history.replaceState({}, '', window.location.pathname);
        }
      };

      const handleLogout = () => {
        setToken(null);
        setTeacher(null);
        setStudentAuth(null);
        setStudents([]);
        setContentLibrary([]);
        setAssignments([]);
        setProgress([]);
        setMode("teacher");
        setTeacherPage("students");
        setSelectedStudentId(null);
      };

      // Student-authed view (logged in via PIN)
      if (studentAuth) {
        return (
          <StudentView
            studentId={studentAuth.student.id}
            student={studentAuth.student}
            token={studentAuth.token}
            onBack={() => setStudentAuth(null)}
            isStudentAuth={true}
          />
        );
      }

      // Show login if not authenticated as teacher
      if (!token) {
        return <LoginScreen onAuth={handleAuth} onStudentAuth={handleStudentAuth} />;
      }

      // Show loading while initial data loads
      if (loading) {
        return (
          <div style={styles.app}>
            <div style={styles.topBar}>
              <span style={styles.logo}>My <span style={styles.logoAccent}>Woodshed</span> Music</span>
            </div>
            <div style={styles.container}><Loading message="Loading your studio..." /></div>
          </div>
        );
      }

      // Lesson viewer (full page)
      if (viewingLesson) {
        return (
          <LessonViewer
            lessonHtml={viewingLesson.html}
            title={viewingLesson.content?.title || "Lesson"}
            track={viewingLesson.content?.track}
            type={viewingLesson.content?.type}
            onBack={() => { setViewingLesson(null); }}
          />
        );
      }

      // Student view (teacher viewing as student)
      if (mode === "student" && selectedStudentId) {
        const selectedStudent = students.find(s => s.id === selectedStudentId);
        return (
          <StudentView
            studentId={selectedStudentId}
            student={selectedStudent}
            token={token}
            onBack={() => { setMode("teacher"); setSelectedStudentId(null); loadAllData(); }}
            isStudentAuth={false}
          />
        );
      }

      return (
        <div style={styles.app}>
          <div style={styles.topBar}>
            <span style={styles.logo}>My <span style={styles.logoAccent}>Woodshed</span> Music</span>
            <div style={{ display: "flex", alignItems: "center" }}>
              <nav style={styles.nav}>
                <button style={styles.navBtn(teacherPage === "students")} onClick={() => setTeacherPage("students")}>
                  <span style={{ display: "flex", alignItems: "center", gap: "6px" }}><Icons.User /> Students</span>
                </button>
                <button style={styles.navBtn(teacherPage === "library")} onClick={() => setTeacherPage("library")}>
                  <span style={{ display: "flex", alignItems: "center", gap: "6px" }}><Icons.Book /> Library</span>
                </button>
                <button style={styles.navBtn(teacherPage === "assignments")} onClick={() => setTeacherPage("assignments")}>
                  <span style={{ display: "flex", alignItems: "center", gap: "6px" }}><Icons.Clipboard /> Assignments</span>
                </button>
              </nav>
              {students.length > 0 && (
                <div style={{ marginLeft: "16px", position: "relative" }}>
                  <select
                    onChange={e => { if (e.target.value) { setSelectedStudentId(e.target.value); setMode("student"); } }}
                    value=""
                    style={{ ...styles.switchBtn, appearance: "none", paddingRight: "28px", background: "transparent" }}
                  >
                    <option value="" disabled>Student View</option>
                    {students.map(s => <option key={s.id} value={s.id} style={{ color: "#3d2e1e" }}>View as {s.name}</option>)}
                  </select>
                </div>
              )}
              <button onClick={handleLogout} style={{ ...styles.switchBtn, display: "flex", alignItems: "center", gap: "6px", marginLeft: "8px" }} title="Sign out">
                <Icons.Logout /> Sign Out
              </button>
            </div>
          </div>

          <div style={styles.container}>
            <ErrorBanner message={error} onDismiss={() => setError("")} />

            {teacherPage === "students" && (
              <TeacherStudents
                students={students}
                assignments={assignments}
                progress={progress}
                contentLibrary={contentLibrary}
                token={token}
                onRefreshStudents={refreshStudents}
                onRefreshAssignments={refreshAssignments}
                onRefreshProgress={() => fetchAllProgress()}
              />
            )}
            {teacherPage === "library" && (
              <TeacherLibrary
                contentLibrary={contentLibrary}
                token={token}
                onRefreshContent={refreshContent}
                onViewLesson={(id, html) => { setViewingLesson({ id, html, content: contentLibrary.find(c => c.id === id) }); }}
              />
            )}
            {teacherPage === "assignments" && (
              <TeacherAssignments
                students={students}
                contentLibrary={contentLibrary}
                assignments={assignments}
                progress={progress}
                token={token}
                onRefreshAssignments={refreshAssignments}
                onRefreshContent={refreshContent}
              />
            )}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
